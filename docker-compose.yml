version: '3.8'

services:
  cc:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cc-calculator
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=./data/cc.sqlite
      - NEXT_PUBLIC_APP_NAME=cc
    volumes:
      - cc_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/history"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  cc_data:
    driver: local
